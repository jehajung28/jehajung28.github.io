<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles/style.css">
  <title>Halaman Login</title>
  <style>
    :root {
      --pink-deep: #d63384;
      --pink-mid: #f48fb1;
      --pink-soft: #fce4ec;
      --pink-light: #fff0f5;
      --cream: #fffaf9;
      --text-dark: #3b1a2e;
      --text-mid: #7a3f5e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lato', sans-serif;
      min-height: 100vh;
      background: var(--cream);
      overflow: hidden;
      position: relative;
    }

    /* Decorative background blobs */
    body::before {
      content: '';
      position: fixed;
      top: -120px; left: -120px;
      width: 420px; height: 420px;
      background: radial-gradient(circle, #f8bbd0cc, transparent 70%);
      border-radius: 50%;
      z-index: 0;
      animation: floatBlob 8s ease-in-out infinite;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px; right: -100px;
      width: 380px; height: 380px;
      background: radial-gradient(circle, #f48fb1aa, transparent 70%);
      border-radius: 50%;
      z-index: 0;
      animation: floatBlob 10s ease-in-out infinite reverse;
    }

    @keyframes floatBlob {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(20px) scale(1.05); }
    }

    /* Floating petals */
    .petals { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .petal {
      position: absolute;
      width: 10px; height: 10px;
      background: var(--pink-mid);
      border-radius: 50% 0 50% 0;
      opacity: 0;
      animation: fall linear infinite;
    }
    .petal:nth-child(1)  { left: 5%;  width: 8px;  height: 8px;  animation-duration: 9s;  animation-delay: 0s;   background: #f8bbd0; }
    .petal:nth-child(2)  { left: 15%; width: 12px; height: 12px; animation-duration: 11s; animation-delay: 1s;   background: #f48fb1; }
    .petal:nth-child(3)  { left: 28%; width: 7px;  height: 7px;  animation-duration: 8s;  animation-delay: 3s;   background: #fce4ec; }
    .petal:nth-child(4)  { left: 42%; width: 10px; height: 10px; animation-duration: 12s; animation-delay: 0.5s; background: #e91e8c44; }
    .petal:nth-child(5)  { left: 55%; width: 9px;  height: 9px;  animation-duration: 10s; animation-delay: 2s;   background: #f48fb1; }
    .petal:nth-child(6)  { left: 68%; width: 11px; height: 11px; animation-duration: 9s;  animation-delay: 4s;   background: #f8bbd0; }
    .petal:nth-child(7)  { left: 78%; width: 8px;  height: 8px;  animation-duration: 13s; animation-delay: 1.5s; background: #fce4ec; }
    .petal:nth-child(8)  { left: 88%; width: 10px; height: 10px; animation-duration: 11s; animation-delay: 3.5s; background: #f48fb1; }
    .petal:nth-child(9)  { left: 33%; width: 6px;  height: 6px;  animation-duration: 7s;  animation-delay: 2.5s; background: #f8bbd0; }
    .petal:nth-child(10) { left: 60%; width: 13px; height: 13px; animation-duration: 14s; animation-delay: 0.8s; background: #fce4ec; }

    @keyframes fall {
      0%   { opacity: 0; transform: translateY(-20px) rotate(0deg); }
      10%  { opacity: 0.8; }
      90%  { opacity: 0.6; }
      100% { opacity: 0; transform: translateY(100vh) rotate(360deg); }
    }

    /* Login container */
    .login_container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      position: relative;
      z-index: 1;
    }

    .login_card {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(244, 143, 177, 0.3);
      border-radius: 32px;
      padding: 52px 44px 44px;
      width: 440px;
      max-width: 92vw;
      box-shadow:
        0 8px 40px rgba(214, 51, 132, 0.12),
        0 2px 12px rgba(214, 51, 132, 0.06);
      animation: cardIn 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .login_title {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      color: var(--text-dark);
      text-align: center;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .login_subtitle {
      font-family: 'Lato', sans-serif;
      font-size: 0.82rem;
      color: var(--text-mid);
      text-align: center;
      margin-bottom: 32px;
      letter-spacing: 0.04em;
    }

    .login_form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .input_wrapper {
      position: relative;
    }

    .input_wrapper span {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      height: 48px;
      border: 1.5px solid #f8bbd0;
      border-radius: 12px;
      padding-left: 44px;
      padding-right: 16px;
      font-family: 'Lato', sans-serif;
      font-size: 0.95rem;
      color: var(--text-dark);
      background: rgba(255,240,245,0.6);
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: var(--pink-deep);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(214, 51, 132, 0.1);
    }

    input::placeholder {
      color: #c8a0b4;
    }

    button[type="submit"] {
      width: 100%;
      height: 50px;
      margin-top: 6px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #d63384, #f06292);
      color: #fff;
      font-family: 'Lato', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
      box-shadow: 0 4px 18px rgba(214, 51, 132, 0.35);
    }

    button[type="submit"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(214, 51, 132, 0.45);
      filter: brightness(1.05);
    }

    button[type="submit"]:active {
      transform: translateY(0);
    }

    .login_description {
      font-size: 0.78rem;
      color: #b07898;
      margin-top: 20px;
      text-align: center;
      font-style: italic;
      line-height: 1.6;
    }

    /* Heart decoration */
    .heart_deco {
      text-align: center;
      margin-bottom: 20px;
      font-size: 1.6rem;
      animation: heartbeat 1.4s ease-in-out infinite;
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14% { transform: scale(1.2); }
      28% { transform: scale(1); }
      42% { transform: scale(1.15); }
      70% { transform: scale(1); }
    }

    @media (max-width: 480px) {
      .login_card { padding: 40px 28px 36px; }
      .login_title { font-size: 1.5rem; }
    }
  </style>
</head>

<body>
  <div class="petals">
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
  </div>

  <div class="login_container">
    <div class="login_card">
      <div class="heart_deco">🌸</div>
      <h2 class="login_title">Hi Koko Sayang 👋🏼</h2>
      <p class="login_subtitle">login dulu yuk sebelum masuk</p>
      <form id="loginForm" class="login_form">
        <div class="input_wrapper">
          <span>🗺️</span>
          <input type="text" id="username" placeholder="Username" />
        </div>
        <div class="input_wrapper">
          <span>🔒</span>
          <input type="password" id="password" placeholder="Password" />
        </div>
        <button type="submit" id="loginBtn">Masuk ✨</button>
      </form>
      <p class="login_description">
        pssstttt, usernamenya isi tempat date pertama kita<br/>dan passwordnya itu tanggal kita ketemu ya 🤭
      </p>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script type="application/javascript" src="./scripts/index.js"></script>
</body>
</html>
